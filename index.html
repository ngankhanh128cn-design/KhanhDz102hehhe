<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thuyết Trình Thủy Tinh - Ngân Khánh</title>

<style>
body, html {
    margin: 0; padding: 0; height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #a2d2ff, #c9bbff);
    display: flex; justify-content: center; align-items: center;
}

/* ☁️ MÂY */
.decor { position: absolute; pointer-events: none; z-index: 1; }
.cloud {
    font-size: 60px;
    opacity: 0.7;
    animation: moveCloud 25s linear infinite;
}
@keyframes moveCloud {
    from { transform: translateX(-100vw); }
    to { transform: translateX(100vw); }
}

/* 🌿 CÂY */
.tree-left { bottom: -10px; left: -10px; font-size: 140px; }
.tree-right { bottom: -10px; right: -10px; font-size: 110px; }

/* 🐰 ICON TRANG TRÍ */
.cute { position: absolute; font-size: 40px; opacity: 0.9; }
.rabbit { top: 10%; left: 5%; }
.cat { bottom: 15%; right: 10%; }
.leaf { top: 40%; left: 90%; }

/* CARD */
#slide-card {
    width: 95%; max-width: 900px;
    background: white;
    border-radius: 40px;
    padding: 30px;
    text-align: center;
    z-index: 10;
}

.illustration-box {
    height: 350px;
    display: flex; justify-content: center; align-items: center;
}
img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 20px;
}

h1 { color: #00838f; }
#text { font-size: 22px; font-weight: bold; }

/* BUTTON */
button {
    padding: 12px 30px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    background: #4fc3f7;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

/* OVERLAY */
#overlay {
    position: fixed;
    width: 100%; height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 1000;
}

#start-btn {
    font-size: 30px;
    padding: 20px 60px;
    border-radius: 50px;
    background: #ff4081;
    color: white;
}
</style>
</head>

<body>

<!-- ☁️ MÂY -->
<div class="decor cloud" style="top:10%;">☁️</div>
<div class="decor cloud" style="top:25%; animation-delay:-7s;">☁️</div>
<div class="decor cloud" style="top:15%; animation-delay:-15s;">☁️</div>

<!-- 🌿 CÂY -->
<div class="decor tree-left">🌿</div>
<div class="decor tree-right">🌴</div>

<!-- 🐰 ICON -->
<div class="cute rabbit">🐰</div>
<div class="cute cat">🐱</div>
<div class="cute leaf">🍃</div>

<!-- OVERLAY -->
<div id="overlay">
    <div style="font-size:100px;">🦈💐</div>
    <button id="start-btn">BẮT ĐẦU ✨</button>
</div>

<!-- NHẠC -->
<audio id="bgMusic" loop>
    <source src="nhac.mp3" type="audio/mpeg">
</audio>

<!-- SLIDE -->
<div id="slide-card">
    <h1 id="title"></h1>

    <div class="illustration-box">
        <img id="img">
    </div>

    <p id="text"></p>

    <button id="prevBtn">⟵ Quay lại</button>
    <button id="nextBtn">Tiếp theo ⟶</button>

    <p>Ngân Khánh 🦈</p>
</div>

<script>
const slides = [
{title:"MỞ ĐẦU 🐰", img:"https://upload.wikimedia.org/wikipedia/commons/0/0b/Glass_objects.jpg", text:"Chào thầy cô và các bạn :3 mình là Ngân Khánh!"},
{title:"THỦY TINH 🐱", img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Glass_chemical_structure.png", text:"Thủy tinh là chất rắn trong suốt nhưng dễ vỡ :>"},
{title:"ỨNG DỤNG 🍃", img:"https://upload.wikimedia.org/wikipedia/commons/6/6e/Glassware.jpg", text:"Dùng làm ly, kính, điện thoại."},
{title:"NGUYÊN LIỆU 🌿", img:"https://upload.wikimedia.org/wikipedia/commons/8/8c/Sand_dunes.jpg", text:"Cát, sô-đa, đá vôi."},
{title:"NUNG 🔥", img:"https://upload.wikimedia.org/wikipedia/commons/5/5d/Glass_furnace.jpg", text:"Nung ở nhiệt độ cao."},
{title:"TẠO HÌNH 🫧", img:"https://upload.wikimedia.org/wikipedia/commons/2/2e/Glassblowing.jpg", text:"Thổi hoặc ép khuôn."},
{title:"HOÀN THIỆN ✨", img:"https://upload.wikimedia.org/wikipedia/commons/1/1b/Glass_polishing.jpg", text:"Làm nguội và mài bóng."},
{title:"TÁI CHẾ ♻️", img:"https://upload.wikimedia.org/wikipedia/commons/4/4f/Glass_recycling.jpg", text:"Có thể tái chế nhiều lần."},
{title:"KẾT 💐", img:"https://upload.wikimedia.org/wikipedia/commons/3/3b/Glass_cups.jpg", text:"Cảm ơn mọi người đã lắng nghe :3"}
];

let current = 0;
const music = document.getElementById("bgMusic");

function speak(text){
    speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = "vi-VN";
    speechSynthesis.speak(msg);
}

function show(){
    let s = slides[current];
    document.getElementById("title").innerText = (current+1)+". "+s.title;
    document.getElementById("img").src = s.img;
    document.getElementById("text").innerText = s.text;
    speak(s.text);
}

document.getElementById("nextBtn").onclick = ()=>{ if(current<slides.length-1){current++;show();}};
document.getElementById("prevBtn").onclick = ()=>{ if(current>0){current--;show();}};

document.getElementById("start-btn").onclick = ()=>{
    document.getElementById("overlay").style.display="none";
    music.volume = 0.4;
    music.play();
    show();
};
</script>

</body>
</html>
