<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thuyết Trình Thủy Tinh - Ngân Khánh</title>

<style>
body, html {
    margin: 0; padding: 0; height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #a2d2ff, #c9bbff);
    display: flex; justify-content: center; align-items: center;
}

.decor { position: absolute; pointer-events: none; }
.cloud { font-size: 60px; opacity: 0.7; animation: move 25s linear infinite; }
@keyframes move { from { transform: translateX(-100vw);} to {transform: translateX(100vw);} }

#slide-card {
    width: 90%; max-width: 900px;
    background: white;
    border-radius: 40px;
    padding: 30px;
    text-align: center;
}

.illustration-box {
    height: 350px;
    display: flex; justify-content: center; align-items: center;
}
img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; }

h1 { color: #00838f; }
#text { font-size: 22px; font-weight: bold; }

button {
    padding: 12px 30px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    background: #4fc3f7;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

#overlay {
    position: fixed;
    width: 100%; height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#start-btn {
    font-size: 30px;
    padding: 20px 60px;
    border-radius: 50px;
    background: #ff4081;
    color: white;
}
</style>
</head>

<body>

<div id="overlay">
    <div style="font-size:100px;">🦈💐</div>
    <button id="start-btn">BẮT ĐẦU ✨</button>
</div>

<audio id="bgMusic" loop>
    <source src="Đã Lỡ Yêu Em Nhiều.mp3" type="audio/mpeg">
</audio>

<div id="slide-card">
    <h1 id="title"></h1>

    <div class="illustration-box">
        <img id="img">
    </div>

    <p id="text"></p>

    <button id="prevBtn">⟵ Quay lại</button>
    <button id="nextBtn">Tiếp theo ⟶</button>

    <p>Ngân Khánh 🦈</p>
</div>

<script>
const slides = [
{title:"MỞ ĐẦU", img:"https://picsum.photos/1000/400?1", text:"Chào thầy cô và các bạn, mình là Ngân Khánh. Hôm nay mình sẽ nói về thủy tinh!"},
{title:"THỦY TINH LÀ GÌ?", img:"https://picsum.photos/1000/400?2", text:"Thủy tinh là chất rắn trong suốt, cứng nhưng dễ vỡ."},
{title:"ỨNG DỤNG", img:"https://picsum.photos/1000/400?3", text:"Dùng làm ly, cửa kính, điện thoại."},
{title:"NGUYÊN LIỆU", img:"https://picsum.photos/1000/400?4", text:"Cát, sô-đa và đá vôi."},
{title:"NUNG CHẢY", img:"https://picsum.photos/1000/400?5", text:"Nung ở 1600°C để tạo thủy tinh lỏng."},
{title:"TẠO HÌNH", img:"https://picsum.photos/1000/400?6", text:"Thổi hoặc ép để tạo hình."},
{title:"HOÀN THIỆN", img:"https://picsum.photos/1000/400?7", text:"Làm nguội và mài bóng."},
{title:"TÁI CHẾ", img:"https://picsum.photos/1000/400?8", text:"Có thể tái chế nhiều lần."},
{title:"LỜI KẾT", img:"https://picsum.photos/1000/400?9", text:"Cảm ơn mọi người đã lắng nghe!"}
];

let current = 0;
const music = document.getElementById("bgMusic");

function speak(text){
    window.speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = "vi-VN";
    msg.rate = 1.1;
    speechSynthesis.speak(msg);
}

function show(){
    let s = slides[current];
    document.getElementById("title").innerText = (current+1)+". "+s.title;
    document.getElementById("img").src = s.img;
    document.getElementById("text").innerText = s.text;
    speak(s.text);
}

document.getElementById("nextBtn").onclick = ()=>{
    if(current < slides.length-1){ current++; show(); }
};

document.getElementById("prevBtn").onclick = ()=>{
    if(current > 0){ current--; show(); }
};

document.getElementById("start-btn").onclick = ()=>{
    document.getElementById("overlay").style.display="none";
    music.volume = 0.4;
    music.play();
    show();
};
</script>

</body>
</html>
