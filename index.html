<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuyết Trình Thủy Tinh - Ngân Khánh :3</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #a2d2ff 0%, #c9bbff 100%); display: flex; justify-content: center; align-items: center; }
        
        .decor { position: absolute; pointer-events: none; z-index: 1; }
        .cloud { font-size: 60px; color: white; opacity: 0.7; animation: moveCloud 25s linear infinite; }
        @keyframes moveCloud { from { transform: translateX(-100vw); } to { transform: translateX(100vw); } }

        .tree-left { bottom: -10px; left: -10px; font-size: 140px; opacity: 0.8; z-index: 5; }
        .tree-right { bottom: -10px; right: -10px; font-size: 110px; opacity: 0.7; z-index: 5; }

        #slide-card {
            width: 95%; max-width: 950px; background: rgba(255, 255, 255, 0.98);
            border-radius: 50px; padding: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center; z-index: 10; position: relative; border: 8px solid #fff;
        }
        .illustration-box {
            width: 100%; height: 400px; margin: 15px 0; border-radius: 25px; overflow: hidden; background: #f9f9f9;
            display: flex; justify-content: center; align-items: center; border: 2px dashed #ddd;
        }
        .illustration-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        h1 { color: #00838f; font-size: 3.2em; margin: 5px 0; text-transform: uppercase; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        #text-container { font-size: 2.5em; line-height: 1.4; color: #222; min-height: 160px; font-weight: bold; padding: 0 20px; display: flex; align-items: center; justify-content: center; }
        
        .btn-group { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        .nav-btn { background: #4fc3f7; color: white; border: none; padding: 15px 50px; border-radius: 40px; cursor: pointer; font-weight: bold; font-size: 1.8em; transition: 0.3s; }
        .nav-btn:hover { background: #0288d1; transform: scale(1.05); }
        .hidden { display: none !important; }

        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: white; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-btn { padding: 25px 70px; font-size: 35px; border-radius: 60px; border:none; background: #ff4081; color:white; cursor:pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="decor cloud" style="top: 10%; animation-delay: 0s;">☁️</div>
<div class="decor cloud" style="top: 25%; animation-delay: -7s;">☁️</div>
<div class="decor cloud" style="top: 15%; animation-delay: -15s; font-size: 80px;">☁️</div>
<div class="decor tree-left">🌿</div>
<div class="decor tree-right">🌴</div>

<div id="overlay">
    <div style="font-size: 120px; margin-bottom: 20px;">🦈💐 :3</div>
    <button id="start-btn">BẮT ĐẦU ✨</button>
</div>

<div id="slide-card">
    <h1 id="title">Trang 1</h1>
    <div class="illustration-box">
        <img id="main-img" src="" onerror="this.src='https://via.placeholder.com/800x400?text=Khong+load+duoc+anh+:( '">
    </div>
    <div id="text-container"><p id="text">...</p></div>
    <div class="btn-group">
        <button class="nav-btn" id="prevBtn">⟵ Quay lại</button>
        <button class="nav-btn" id="nextBtn">Tiếp theo ⟶</button>
    </div>
    <div style="margin-top: 15px; font-weight: bold; color: #00838f; font-size: 1.4em;">
        Hoàng Ngân Khánh 🦈 ;>
    </div>
</div>

<script>
const slides = [
    { title: "MỞ ĐẦU :>", img: "https://images.unsplash.com/photo-1526318472351-bc6c0c8f6d4b?auto=format&fit=crop&w=1000&q=80", text: "Chào thầy cô và các bạn, mình là Ngân Khánh :3 Hôm nay mình sẽ nói về quy trình làm ra Thủy Tinh!" },
    { title: "THỦY TINH LÀ GÌ? :>", img: "https://images.unsplash.com/photo-1581091215367-59ab6b6f3f0b?auto=format&fit=crop&w=1000&q=80", text: "Thủy tinh là chất rắn vô định hình, trong suốt và cứng nhưng rất dễ vỡ 💎" },
    { title: "ỨNG DỤNG ;>", img: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1000&q=80", text: "Nó được dùng làm ly chén, cửa kính, màn hình điện thoại và thiết bị y tế 📱" },
    { title: "NGUYÊN LIỆU :3", img: "https://images.unsplash.com/photo-1508182311256-e3f3b0d5cbe8?auto=format&fit=crop&w=1000&q=80", text: "Nguyên liệu chính là cát thạch anh, kết hợp với sô-đa và đá vôi 🏖️" },
    { title: "NUNG CHẢY 🔥", img: "https://images.unsplash.com/photo-1503387762-592deb58ef4e?auto=format&fit=crop&w=1000&q=80", text: "Hỗn hợp được nung ở 1600 độ C để trở thành dạng lỏng nóng chảy" },
    { title: "TẠO HÌNH :>", img: "https://images.unsplash.com/photo-1581093588401-22f2e1c9f9c1?auto=format&fit=crop&w=1000&q=80", text: "Người ta thổi hoặc ép khuôn để tạo ra hình dáng mong muốn 🫧" },
    { title: "HOÀN THIỆN ✨", img: "https://images.unsplash.com/photo-1602524209495-5a5b57c6f0bb?auto=format&fit=crop&w=1000&q=80", text: "Sau khi làm nguội và mài bóng, ta có sản phẩm hoàn chỉnh" },
    { title: "TÁI CHẾ 🌱", img: "https://images.unsplash.com/photo-1581578731548-c64695cc6952?auto=format&fit=crop&w=1000&q=80", text: "Thủy tinh có thể tái chế nhiều lần, giúp bảo vệ môi trường ♻️" },
    { title: "LỜI KẾT 💐", img: "https://images.unsplash.com/photo-1492724441997-5dc865305da7?auto=format&fit=crop&w=1000&q=80", text: "Cảm ơn mọi người đã lắng nghe :3 Chúc mọi người một ngày thật vui!" }
];

let current = 0;

function update() {
    const s = slides[current];
    document.getElementById('title').innerText = (current + 1) + ". " + s.title;
    document.getElementById('main-img').src = s.img;
    document.getElementById('text').innerText = s.text;
    document.getElementById('nextBtn').classList.toggle('hidden', current === slides.length - 1);
}

document.getElementById('nextBtn').onclick = () => { if(current < slides.length-1){ current++; update(); } };
document.getElementById('prevBtn').onclick = () => { if(current > 0){ current--; update(); } };

document.getElementById('start-btn').onclick = () => {
    document.getElementById('overlay').style.display = 'none';
    update();
};
</script>

</body>
</html>
