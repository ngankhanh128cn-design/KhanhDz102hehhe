<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuyết Trình Thủy Tinh - Ngân Khánh</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a2d2ff 0%, #c9bbff 100%);
            display: flex; justify-content: center; align-items: center;
        }

        /* Decor mây và cây */
        .decor { position: absolute; pointer-events: none; z-index: 1; }
        .tree-left { bottom: -10px; left: -10px; font-size: 140px; opacity: 0.8; }
        .tree-right { bottom: -10px; right: -10px; font-size: 110px; opacity: 0.7; }
        .cloud { font-size: 50px; color: white; opacity: 0.6; animation: moveCloud 25s linear infinite; }
        @keyframes moveCloud { from { transform: translateX(-100vw); } to { transform: translateX(100vw); } }

        #slide-card {
            width: 85%; max-width: 600px; background: rgba(255, 255, 255, 0.95);
            border-radius: 40px; padding: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            text-align: center; z-index: 10; position: relative; border: 5px solid #fff;
        }

        .gura-box {
            width: 150px; height: 150px; margin: 0 auto 20px;
            border-radius: 50%; overflow: hidden; border: 5px solid #e0f7fa;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .gura-box img { width: 100%; height: 100%; object-fit: cover; }

        h1 { color: #00838f; font-size: 1.6em; margin-bottom: 10px; text-transform: uppercase; }
        p { font-size: 1.1em; line-height: 1.6; color: #333; min-height: 100px; }
        
        .btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .nav-btn {
            background: #4fc3f7; color: white; border: none; padding: 10px 25px;
            border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .nav-btn:hover { background: #0288d1; transform: scale(1.05); }

        #overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: white;
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #start-btn {
            padding: 18px 45px; font-size: 22px; border-radius: 40px; border:none;
            background: #ff4081; color:white; cursor:pointer; font-weight:bold;
            box-shadow: 0 8px 20px rgba(255,64,129,0.4);
        }
    </style>
</head>
<body>

<div class="decor tree-left">🌿</div>
<div class="decor tree-right">🌴</div>
<div class="decor cloud" style="top: 10%;">☁️</div>
<div class="decor cloud" style="top: 20%; animation-delay: -5s;">☁️</div>

<div id="overlay">
    <div style="font-size: 80px; margin-bottom: 20px;">🦈💙</div>
    <button id="start-btn">BẮT ĐẦU THUYẾT TRÌNH</button>
</div>

<audio id="bgMusic" loop>
    <source src="Đã Lỡ Yêu Em Nhiều.mp3" type="audio/mpeg">
</audio>

<div id="slide-card">
    <div class="gura-box">
        <img src="https://i.ibb.co/VmxM4Gf/image-a415a0.jpg" alt="Gura">
    </div>
    <h1 id="title">Trang 1: Mở Đầu</h1>
    <p id="text">...</p>
    <div class="btn-group">
        <button class="nav-btn" id="prevBtn">Quay lại</button>
        <button class="nav-btn" id="nextBtn">Tiếp theo</button>
    </div>
    <div style="margin-top: 15px; font-weight: bold; color: #00838f;">Hoàng Ngân Khánh</div>
</div>

<script>
    const slides = [
        { title: "CHÀO MỪNG MỌI NGƯỜI!", text: "Xin chào thầy cô và các bạn. Mình là Hoàng Ngân Khánh. Hôm nay mình rất vui được thuyết trình về quá trình sản xuất thủy tinh. Mời mọi người cùng theo dõi nhé!" },
        { title: "Thủy tinh là gì?", text: "Thủy tinh là một chất rắn vô định hình cực kỳ đặc biệt. Nó trong suốt, cứng nhưng lại rất dễ vỡ nếu chúng ta không nâng niu." },
        { title: "Nguyên liệu chính", text: "Bí mật nằm ở Cát Thạch Anh! Ngoài ra còn có sô-đa và đá vôi được pha trộn theo tỉ lệ hoàn hảo để tạo nên độ bền." },
        { title: "Nung chảy thần kỳ", text: "Hỗn hợp được nung ở nhiệt độ cực cao, lên tới 1600 độ C để trở thành một dòng dung dịch lỏng đỏ rực như nham thạch." },
        { title: "Tạo hình khéo léo", text: "Lúc này, người thợ sẽ thổi hoặc ép khuôn để tạo ra chai lọ, bóng đèn hoặc những tấm kính phẳng lung linh." },
        { title: "Lời kết", text: "Cảm ơn thầy cô và các bạn đã lắng nghe bài thuyết trình của mình. Nếu có sai sót thì cho mình thêm góp ý. Chúc mọi người một ngày thật vui vẻ!" }
    ];

    let current = 0;
    const music = document.getElementById('bgMusic');

    function speak(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'vi-VN';
        msg.rate = 1.4; 
        window.speechSynthesis.speak(msg);
    }

    function update() {
        const s = slides[current];
        document.getElementById('title').innerText = s.title;
        document.getElementById('text').innerText = s.text;
        speak(s.text);
    }

    document.getElementById('nextBtn').onclick = () => { if(current < slides.length-1) { current++; update(); } };
    document.getElementById('prevBtn').onclick = () => { if(current > 0) { current--; update(); } };

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('overlay').style.display = 'none';
        music.volume = 0.05; // Nhạc nhỏ thoang thoảng như Khánh muốn
        music.play();
        update(); // Bấm cái là Gura nói luôn
    };
</script>
</body>
</html>
