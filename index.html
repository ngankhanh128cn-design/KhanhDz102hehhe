<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thuyết Trình Thủy Tinh :3</title>

<style>
body, html {
    margin: 0; padding: 0; height: 100%;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #a2d2ff, #c9bbff);
    display: flex; justify-content: center; align-items: center;
}

#slide-card {
    width: 90%; max-width: 900px;
    background: white;
    border-radius: 40px;
    padding: 30px;
    text-align: center;
}

.illustration-box {
    height: 350px;
    display: flex; justify-content: center; align-items: center;
}

img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 20px;
}

h1 { color: #00838f; }

#text { font-size: 22px; font-weight: bold; }

button {
    padding: 12px 30px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    background: #4fc3f7;
    color: white;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="slide-card">
    <h1 id="title"></h1>

    <div class="illustration-box">
        <img id="img">
    </div>

    <p id="text"></p>

    <button onclick="prev()">⟵ Quay lại</button>
    <button onclick="next()">Tiếp theo ⟶</button>

    <p style="margin-top:10px;">Ngân Khánh 🐱 :3</p>
</div>

<script>
const slides = [
{
title: "1. MỞ ĐẦU",
img: "https://images.unsplash.com/photo-1526318472351-bc6c0c8f6d4b?auto=format&fit=crop&w=1000&q=80",
text: "Chào thầy cô và các bạn :3 Hôm nay mình sẽ thuyết trình về thủy tinh!"
},

{
title: "2. THỦY TINH LÀ GÌ?",
img: "https://images.unsplash.com/photo-1581091215367-59ab6b6f3f0b?auto=format&fit=crop&w=1000&q=80",
text: "Thủy tinh là chất rắn trong suốt, cứng nhưng dễ vỡ 💎"
},

{
title: "3. ỨNG DỤNG",
img: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1000&q=80",
text: "Dùng làm ly, cửa kính, điện thoại 📱 ;>"
},

{
title: "4. NGUYÊN LIỆU",
img: "https://images.unsplash.com/photo-1508182311256-e3f3b0d5cbe8?auto=format&fit=crop&w=1000&q=80",
text: "Cát + soda + đá vôi 🏖️"
},

{
title: "5. NUNG CHẢY",
img: "https://images.unsplash.com/photo-1536924430914-bc169da20611?auto=format&fit=crop&w=1000&q=80",
text: "Nung ở 1600°C để thành chất lỏng 🔥"
},

{
title: "6. TẠO HÌNH",
img: "https://images.unsplash.com/photo-1578338712396-03f89025e630?auto=format&fit=crop&w=1000&q=80",
text: "Thổi hoặc ép để tạo hình 🫧"
},

{
title: "7. HOÀN THIỆN",
img: "https://images.unsplash.com/photo-1544032449-37335606d289?auto=format&fit=crop&w=1000&q=80",
text: "Làm nguội và mài bóng ✨"
},

{
title: "8. TÁI CHẾ",
img: "https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?auto=format&fit=crop&w=1000&q=80",
text: "Có thể tái chế nhiều lần ♻️"
},

{
title: "9. LỜI KẾT",
img: "https://images.unsplash.com/photo-1492724441997-5dc865305da7?auto=format&fit=crop&w=1000&q=80",
text: "Cảm ơn mọi người đã lắng nghe :3 💐"
}
];

let i = 0;

function show() {
    document.getElementById("title").innerText = slides[i].title;
    document.getElementById("img").src = slides[i].img;
    document.getElementById("text").innerText = slides[i].text;
}

function next() {
    if(i < slides.length - 1){ i++; show(); }
}

function prev() {
    if(i > 0){ i--; show(); }
}

show();
</script>

</body>
</html>
