<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuyết Trình Thủy Tinh - Ngân Khánh</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a2d2ff 0%, #c9bbff 100%);
            display: flex; justify-content: center; align-items: center;
        }
        .decor { position: absolute; pointer-events: none; z-index: 1; }
        .tree-left { bottom: -10px; left: -10px; font-size: 140px; opacity: 0.8; }
        .tree-right { bottom: -10px; right: -10px; font-size: 110px; opacity: 0.7; }

        #slide-card {
            width: 95%; max-width: 900px; background: rgba(255, 255, 255, 0.98);
            border-radius: 50px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center; z-index: 10; position: relative; border: 8px solid #fff;
        }
        
        .illustration-box {
            width: 100%; height: 380px; margin: 15px 0;
            border-radius: 25px; overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); background: #fff;
        }
        .illustration-box img { width: 100%; height: 100%; object-fit: contain; }

        h1 { color: #00838f; font-size: 3em; margin: 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        
        #text-container { 
            font-size: 2.2em; /* Chữ siêu to cho lớp nhìn rõ */
            line-height: 1.5; 
            color: #222; 
            min-height: 160px; 
            text-align: center; 
            padding: 0 20px; 
            font-weight: bold;
        }
        
        .btn-group { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        .nav-btn {
            background: #4fc3f7; color: white; border: none; padding: 15px 45px;
            border-radius: 40px; cursor: pointer; font-weight: bold; font-size: 1.5em; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(79, 195, 247, 0.4);
        }
        .nav-btn:hover { background: #0288d1; transform: scale(1.1); }
        .hidden { display: none !important; }

        #overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: white;
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #start-btn {
            padding: 25px 60px; font-size: 35px; border-radius: 60px; border:none;
            background: #ff4081; color:white; cursor:pointer; font-weight:bold;
            box-shadow: 0 10px 25px rgba(255,64,129,0.4);
        }
    </style>
</head>
<body>

<div id="overlay">
    <div style="font-size: 100px; margin-bottom: 20px;">🐱💐</div>
    <button id="start-btn">BẮT ĐẦU THUYẾT TRÌNH</button>
</div>

<audio id="bgMusic" loop>
    <source src="Đã Lỡ Yêu Em Nhiều.mp3" type="audio/mpeg">
</audio>

<div id="slide-card">
    <h1 id="title">Trang 1</h1>
    <div class="illustration-box">
        <img id="main-img" src="" alt="Minh họa">
    </div>
    <div id="text-container">
        <p id="text">...</p>
    </div>
    <div class="btn-group">
        <button class="nav-btn" id="prevBtn">Quay lại</button>
        <button class="nav-btn" id="nextBtn">Tiếp theo</button>
    </div>
    <div style="margin-top: 20px; font-weight: bold; color: #00838f; font-size: 1.3em;">Hoàng Ngân Khánh</div>
</div>

<script>
    const slides = [
        { 
            title: "MỞ ĐẦU", 
            img: "https://i.ibb.co/3W6qWfD/image-958a1f.jpg",
            text: "Chào thầy cô và các bạn, mình là Ngân Khánh. Hôm nay mình sẽ nói về quy trình làm ra Thủy Tinh!" 
        },
        { 
            title: "THỦY TINH LÀ GÌ?", 
            img: "https://i.ibb.co/6y4t0QW/image-95153c.png", 
            text: "Thủy tinh là chất rắn vô định hình, trong suốt, cứng nhưng dễ vỡ." 
        },
        { 
            title: "ỨNG DỤNG", 
            img: "https://i.ibb.co/h1GqXyH/image-951505.jpg",
            text: "Được dùng làm ly chén, cửa kính, màn hình điện thoại và thiết bị y tế." 
        },
        { 
            title: "NGUYÊN LIỆU", 
            img: "https://i.ibb.co/Qf0h9Fz/image-9519d5.jpg",
            text: "Nguyên liệu chính là Cát thạch anh, Sô-đa và Đá vôi nung chảy." 
        },
        { 
            title: "TRỘN & NUNG", 
            img: "https://i.ibb.co/L5rMhX9/image-951904.jpg",
            text: "Hỗn hợp được trộn đều rồi nung ở 1600 độ C để trở thành thủy tinh lỏng." 
        },
        { 
            title: "TẠO HÌNH", 
            img: "https://i.ibb.co/v3X2F3k/image-951924.jpg",
            text: "Thủy tinh lỏng được thổi hoặc ép khuôn để tạo ra những sản phẩm đẹp mắt." 
        },
        { 
            title: "HOÀN THIỆN", 
            img: "https://i.ibb.co/mHn2V9z/image-956f54.jpg",
            text: "Sau khi làm nguội và mài bóng, chúng ta có những sản phẩm hoàn chỉnh." 
        },
        { 
            title: "TÁI CHẾ 🌱", 
            img: "https://i.ibb.co/3ykG4S2/image-951237.png",
            text: "Thủy tinh có thể tái chế nhiều lần giúp tiết kiệm tài nguyên môi trường." 
        },
        { 
            title: "LỜI KẾT", 
            img: "https://i.ibb.co/zX95tGf/image-948712.jpg", // Ảnh mèo cầm hoa của Khánh
            text: "Cảm ơn mọi người đã lắng nghe! Chúc các bạn một ngày thật tuyệt vời!" 
        }
    ];

    let current = 0;
    const music = document.getElementById('bgMusic');

    function speak(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'vi-VN';
        msg.rate = 1.3; 
        window.speechSynthesis.speak(msg);
    }

    function update() {
        const s = slides[current];
        document.getElementById('title').innerText = (current + 1) + ". " + s.title;
        document.getElementById('main-img').src = s.img;
        document.getElementById('text').innerText = s.text;
        
        const nextBtn = document.getElementById('nextBtn');
        if (current === slides.length - 1) {
            nextBtn.classList.add('hidden');
        } else {
            nextBtn.classList.remove('hidden');
        }
        
        speak(s.text);
    }

    document.getElementById('nextBtn').onclick = () => { if(current < slides.length-1) { current++; update(); } };
    document.getElementById('prevBtn').onclick = () => { if(current > 0) { current--; update(); } };

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('overlay').style.display = 'none';
        music.volume = 0.7; // Âm lượng 0.7 chuẩn ý Khánh
        music.play();
        update(); 
    };
</script>
</body>
</html>
