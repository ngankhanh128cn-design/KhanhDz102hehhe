<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuyết Trình Thủy Tinh - Ngân Khánh</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a2d2ff 0%, #c9bbff 100%);
            display: flex; justify-content: center; align-items: center;
        }
        .decor { position: absolute; pointer-events: none; z-index: 1; }
        .tree-left { bottom: -10px; left: -10px; font-size: 140px; opacity: 0.8; }
        .tree-right { bottom: -10px; right: -10px; font-size: 110px; opacity: 0.7; }

        #slide-card {
            width: 95%; max-width: 900px; background: rgba(255, 255, 255, 0.98);
            border-radius: 50px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center; z-index: 10; position: relative; border: 8px solid #fff;
        }
        
        /* Box ảnh rộng hơn */
        .illustration-box {
            width: 100%; height: 350px; margin: 15px 0;
            border-radius: 25px; overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); background: #fff;
        }
        .illustration-box img { width: 100%; height: 100%; object-fit: contain; }

        /* Chữ tiêu đề TO */
        h1 { color: #00838f; font-size: 2.8em; margin: 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Nội dung cực TO cho lớp dễ nhìn */
        #text-container { 
            font-size: 1.8em; /* Tăng cỡ chữ lên rất to */
            line-height: 1.6; 
            color: #222; 
            min-height: 180px; 
            text-align: left; 
            padding: 0 30px; 
            font-weight: 500;
        }
        
        .btn-group { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        .nav-btn {
            background: #4fc3f7; color: white; border: none; padding: 15px 45px;
            border-radius: 40px; cursor: pointer; font-weight: bold; font-size: 1.4em; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(79, 195, 247, 0.4);
        }
        .nav-btn:hover { background: #0288d1; transform: scale(1.1); }
        .hidden { display: none !important; }

        #overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: white;
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #start-btn {
            padding: 25px 60px; font-size: 30px; border-radius: 60px; border:none;
            background: #ff4081; color:white; cursor:pointer; font-weight:bold;
            box-shadow: 0 10px 25px rgba(255,64,129,0.4);
        }
    </style>
</head>
<body>

<div id="overlay">
    <div style="font-size: 100px; margin-bottom: 20px;">🦈💙</div>
    <button id="start-btn">BẤT ĐẦU THUYẾT TRÌNH</button>
</div>

<audio id="bgMusic" loop>
    <source src="Đã Lỡ Yêu Em Nhiều.mp3" type="audio/mpeg">
</audio>

<div id="slide-card">
    <h1 id="title">Trang 1</h1>
    <div class="illustration-box">
        <img id="main-img" src="" alt="Minh họa">
    </div>
    <div id="text-container">
        <p id="text">...</p>
    </div>
    <div class="btn-group">
        <button class="nav-btn" id="prevBtn">Quay lại</button>
        <button class="nav-btn" id="nextBtn">Tiếp theo</button>
    </div>
    <div style="margin-top: 20px; font-weight: bold; color: #00838f; font-size: 1.2em;">Hoàng Ngân Khánh</div>
</div>

<script>
    const slides = [
        { 
            title: "MỞ ĐẦU", 
            img: "https://i.ibb.co/3W6qWfD/image-958a1f.jpg",
            text: "Xin chào thầy cô và các bạn. Mình là Hoàng Ngân Khánh. Hôm nay mình sẽ thuyết trình về quá trình sản xuất thủy tinh. Mời mọi người cùng theo dõi!" 
        },
        { 
            title: "THỦY TINH LÀ GÌ?", 
            img: "https://i.ibb.co/3ykG4S2/image-951237.png", 
            text: "Thủy tinh là chất rắn vô định hình. Đặc điểm: Trong suốt, cứng nhưng dễ vỡ, cách điện và cách nhiệt rất tốt." 
        },
        { 
            title: "ỨNG DỤNG", 
            img: "https://i.ibb.co/h1GqXyH/image-951505.jpg",
            text: "Thủy tinh có mặt khắp nơi: ly cốc, kính cường lực, màn hình điện thoại và các thiết bị y tế." 
        },
        { 
            title: "NGUYÊN LIỆU", 
            img: "https://i.ibb.co/6y4t0QW/image-95153c.png",
            text: "Gồm: Cát thạch anh, Sô-đa và Đá vôi. Có thể thêm oxit kim loại để tạo màu sắc." 
        },
        { 
            title: "TRỘN & NUNG", 
            img: "https://i.ibb.co/v3X2F3k/image-951924.jpg",
            text: "Nguyên liệu được trộn đều rồi nung ở nhiệt độ 1400 - 1600 độ C để tạo thành thủy tinh lỏng." 
        },
        { 
            title: "TẠO HÌNH", 
            img: "https://i.ibb.co/6NKQ09t/image-95195b.png",
            text: "Thủy tinh lỏng được thổi, ép khuôn hoặc kéo thành kính phẳng để tạo ra các sản phẩm khác nhau." 
        },
        { 
            title: "Ủ & HOÀN THIỆN", 
            img: "https://i.ibb.co/mHn2V9z/image-956f54.jpg",
            text: "Sản phẩm được làm nguội từ từ (ủ), sau đó mài cạnh và kiểm tra chất lượng kỹ càng." 
        },
        { 
            title: "TÁI CHẾ 🌱", 
            img: "https://i.ibb.co/Zxbz6Q3/image-9573b3.jpg",
            text: "Tái chế thủy tinh giúp tiết kiệm năng lượng và bảo vệ môi trường. Nó có thể tái chế vô số lần." 
        },
        { 
            title: "KẾT LUẬN", 
            img: "https://i.ibb.co/yY1h209/image-950e73.jpg", // Ảnh cuối Gura đứng xịn
            text: "Cảm ơn thầy cô và các bạn đã lắng nghe bài thuyết trình của mình! Chúc mọi người một ngày tốt lành!" 
        }
    ];

    let current = 0;
    const music = document.getElementById('bgMusic');

    function speak(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'vi-VN';
        msg.rate = 1.3; 
        window.speechSynthesis.speak(msg);
    }

    function update() {
        const s = slides[current];
        document.getElementById('title').innerText = (current + 1) + ". " + s.title;
        document.getElementById('main-img').src = s.img;
        document.getElementById('text').innerText = s.text;
        
        if (current === slides.length - 1) {
            document.getElementById('nextBtn').classList.add('hidden');
        } else {
            document.getElementById('nextBtn').classList.remove('hidden');
        }
        
        speak(s.text);
    }

    document.getElementById('nextBtn').onclick = () => { if(current < slides.length-1) { current++; update(); } };
    document.getElementById('prevBtn').onclick = () => { if(current > 0) { current--; update(); } };

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('overlay').style.display = 'none';
        music.play(); // Giữ nguyên âm lượng mặc định của bạn
        update(); 
    };
</script>
</body>
</html>
