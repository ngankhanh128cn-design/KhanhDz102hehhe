<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuyết Trình Thủy Tinh - Ngân Khánh</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a2d2ff 0%, #c9bbff 100%);
            display: flex; justify-content: center; align-items: center;
        }

        .decor { position: absolute; pointer-events: none; z-index: 1; }
        .tree-left { bottom: -10px; left: -10px; font-size: 140px; opacity: 0.8; }
        .tree-right { bottom: -10px; right: -10px; font-size: 110px; opacity: 0.7; }
        .cloud { position: absolute; font-size: 50px; color: white; opacity: 0.6; animation: moveCloud 25s linear infinite; }
        @keyframes moveCloud { from { transform: translateX(-100vw); } to { transform: translateX(100vw); } }

        #slide-card {
            width: 90%; max-width: 750px; background: rgba(255, 255, 255, 0.95);
            border-radius: 40px; padding: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            text-align: center; z-index: 10; position: relative; border: 5px solid #fff;
        }

        /* Khung ảnh minh họa to rõ */
        .illustration-box {
            width: 100%; height: 260px; margin: 15px 0;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); background: #eee;
        }
        .illustration-box img { width: 100%; height: 100%; object-fit: cover; }

        h1 { color: #00838f; font-size: 1.8em; margin-bottom: 5px; text-transform: uppercase; }
        p { font-size: 1.2em; line-height: 1.5; color: #333; min-height: 140px; font-weight: 500; text-align: left; padding: 0 20px; }
        
        .btn-group { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .nav-btn {
            background: #4fc3f7; color: white; border: none; padding: 12px 35px;
            border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.3s;
        }
        .nav-btn:hover { background: #0288d1; transform: scale(1.05); }
        .hidden { display: none; }

        #overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: white;
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #start-btn {
            padding: 20px 50px; font-size: 26px; border-radius: 50px; border:none;
            background: #ff4081; color:white; cursor:pointer; font-weight:bold;
            box-shadow: 0 8px 20px rgba(255,64,129,0.4);
        }
    </style>
</head>
<body>

<div class="decor tree-left">🌿</div>
<div class="decor tree-right">🌴</div>
<div class="cloud" style="top: 5%;">☁️</div>

<div id="overlay">
    <div style="font-size: 100px; margin-bottom: 20px;">🦈✨</div>
    <button id="start-btn">BẮT ĐẦU THUYẾT TRÌNH</button>
</div>

<audio id="bgMusic" loop>
    <source src="Đã Lỡ Yêu Em Nhiều.mp3" type="audio/mpeg">
</audio>

<div id="slide-card">
    <h1 id="title">Trang 1</h1>
    <div class="illustration-box">
        <img id="main-img" src="" alt="Minh họa">
    </div>
    <p id="text">...</p>
    <div class="btn-group">
        <button class="nav-btn" id="prevBtn">Quay lại</button>
        <button class="nav-btn" id="nextBtn">Tiếp theo</button>
    </div>
    <div style="margin-top: 15px; font-weight: bold; color: #00838f;">Hoàng Ngân Khánh</div>
</div>

<script>
    const slides = [
        { 
            title: "MỞ ĐẦU", 
            img: "https://i.ibb.co/VmxM4Gf/image-a415a0.jpg",
            text: "Xin chào thầy cô và các bạn. Mình là Hoàng Ngân Khánh. Hôm nay mình rất vui được thuyết trình về quá trình sản xuất thủy tinh. Mời mọi người cùng theo dõi nhé!" 
        },
        { 
            title: "THỦY TINH LÀ GÌ?", 
            img: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=800",
            text: "Thủy tinh là một chất rắn vô định hình, các phân tử không sắp xếp theo trật tự. Nó trong suốt, có thể tạo hình khi nóng, cứng nhưng dễ vỡ khi chịu lực mạnh. Ngoài ra, nó còn cách điện và cách nhiệt tốt." 
        },
        { 
            title: "ỨNG DỤNG THỰC TẾ", 
            img: "https://images.unsplash.com/photo-1592913035431-7b0682226662?auto=format&fit=crop&w=800",
            text: "Thủy tinh xuất hiện khắp nơi: ly cốc trong gia đình, kính cường lực trong xây dựng, màn hình điện thoại, ống kính máy ảnh và các ống nghiệm y tế. Nó là vật liệu vô cùng quan trọng." 
        },
        { 
            title: "NGUYÊN LIỆU CHÍNH", 
            img: "https://images.unsplash.com/photo-1509192505293-bc44bc6055d7?auto=format&fit=crop&w=800",
            text: "Gồm cát thạch anh chiếm 75%, sô đa giúp giảm nhiệt độ nóng chảy xuống 1500 độ, và đá vôi làm tăng độ bền. Có thể thêm oxit kim loại để tạo màu hoặc thủy tinh vụn để tái chế." 
        },
        { 
            title: "TRỘN NGUYÊN LIỆU", 
            img: "https://images.unsplash.com/photo-1589939705384-5185138a047a?auto=format&fit=crop&w=800",
            text: "Các nguyên liệu được cân theo tỉ lệ phù hợp rồi trộn đều. Việc trộn phải chính xác để tránh thủy tinh bị đục hoặc không đạt độ bền mong muốn." 
        },
        { 
            title: "NUNG CHẢY", 
            img: "https://images.unsplash.com/photo-1533221319760-44933a2588f9?auto=format&fit=crop&w=800",
            text: "Hỗn hợp được đưa vào lò nung từ 1400 đến 1600 độ C. Tại đây, cát nóng chảy hoàn toàn, các phản ứng hóa học xảy ra tạo thành thủy tinh lỏng." 
        },
        { 
            title: "TẠO HÌNH", 
            img: "https://images.unsplash.com/photo-1578326411130-917730e23812?auto=format&fit=crop&w=800",
            text: "Thủy tinh lỏng được thổi để làm chai lọ rỗng, ép khuôn để có hình chính xác hoặc kéo thành các tấm kính phẳng dùng trong xây dựng." 
        },
        { 
            title: "Ủ (LÀM NGUỘI)", 
            img: "https://images.unsplash.com/photo-1504198266287-1659872e6590?auto=format&fit=crop&w=800",
            text: "Sau khi tạo hình, thủy tinh được làm nguội từ từ trong lò ủ. Quá trình này giúp giảm ứng suất bên trong và tránh việc sản phẩm bị nứt vỡ đột ngột." 
        },
        { 
            title: "HOÀN THIỆN", 
            img: "https://images.unsplash.com/photo-1620663045480-165b4f23e74b?auto=format&fit=crop&w=800",
            text: "Sản phẩm được cắt, mài cạnh, đánh bóng và kiểm tra chất lượng. Một số loại đặc biệt còn được tôi nhiệt để trở thành kính cường lực." 
        },
        { 
            title: "BẢO VỆ MÔI TRƯỜNG", 
            img: "https://images.unsplash.com/photo-1605600611280-1a8330f97bb0?auto=format&fit=crop&w=800",
            text: "Tái chế thủy tinh giúp giảm rác thải, tiết kiệm nguyên liệu và năng lượng. Thủy tinh có thể tái chế vô số lần mà không giảm chất lượng." 
        },
        { 
            title: "KẾT LUẬN", 
            img: "https://i.ibb.co/VmxM4Gf/image-a415a0.jpg",
            text: "Từ những nguyên liệu đơn giản như cát, con người đã tạo ra thủy tinh – một vật liệu không thể thiếu. Cảm ơn thầy cô và các bạn đã lắng nghe! Nếu có sai sót thì cho mình thêm góp ý. Chúc mọi người một ngày vui vẻ!" 
        }
    ];

    let current = 0;
    const music = document.getElementById('bgMusic');

    function speak(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'vi-VN';
        msg.rate = 1.3; 
        window.speechSynthesis.speak(msg);
    }

    function update() {
        const s = slides[current];
        document.getElementById('title').innerText = (current + 1) + ". " + s.title;
        document.getElementById('main-img').src = s.img;
        document.getElementById('text').innerText = s.text;
        
        // Bỏ nút Tiếp theo ở trang cuối
        if (current === slides.length - 1) {
            document.getElementById('nextBtn').classList.add('hidden');
        } else {
            document.getElementById('nextBtn').classList.remove('hidden');
        }
        
        speak(s.text);
    }

    document.getElementById('nextBtn').onclick = () => { if(current < slides.length-1) { current++; update(); } };
    document.getElementById('prevBtn').onclick = () => { if(current > 0) { current--; update(); } };

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('overlay').style.display = 'none';
        music.volume = 0.07; // Nhạc nhỏ xíu xíu chuẩn chill
        music.play();
        update();
    };
</script>
</body>
</html>
