<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuyết Trình Thủy Tinh - Ngân Khánh</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #a2d2ff 0%, #c9bbff 100%); display: flex; justify-content: center; align-items: center; }
        
        .decor { position: absolute; pointer-events: none; z-index: 1; }
        .cloud { font-size: 60px; color: white; opacity: 0.7; animation: moveCloud 25s linear infinite; }
        @keyframes moveCloud { from { transform: translateX(-100vw); } to { transform: translateX(100vw); } }

        .tree-left { bottom: -10px; left: -10px; font-size: 140px; opacity: 0.8; z-index: 5; }
        .tree-right { bottom: -10px; right: -10px; font-size: 110px; opacity: 0.7; z-index: 5; }

        #slide-card {
            width: 95%; max-width: 950px; background: rgba(255, 255, 255, 0.98);
            border-radius: 50px; padding: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center; z-index: 10; position: relative; border: 8px solid #fff;
        }
        .illustration-box {
            width: 100%; height: 400px; margin: 15px 0; border-radius: 25px; overflow: hidden; background: #f9f9f9;
            display: flex; justify-content: center; align-items: center; border: 2px dashed #ddd;
        }
        .illustration-box img { width: 100%; height: 100%; object-fit: cover; }
        
        h1 { color: #00838f; font-size: 3.2em; margin: 5px 0; text-transform: uppercase; }
        #text-container { font-size: 2.5em; line-height: 1.4; color: #222; min-height: 160px; font-weight: bold; padding: 0 20px; display: flex; align-items: center; justify-content: center; }
        
        .btn-group { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        .nav-btn { background: #4fc3f7; color: white; border: none; padding: 15px 50px; border-radius: 40px; cursor: pointer; font-weight: bold; font-size: 1.8em; }
        .hidden { display: none !important; }

        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: white; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-btn { padding: 25px 70px; font-size: 35px; border-radius: 60px; border:none; background: #ff4081; color:white; cursor:pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="decor cloud" style="top: 10%;">☁️</div>
<div class="decor cloud" style="top: 25%; animation-delay:-7s;">☁️</div>
<div class="decor cloud" style="top: 15%; animation-delay:-15s;">☁️</div>
<div class="decor tree-left">🌿</div>
<div class="decor tree-right">🌴</div>

<div id="overlay">
    <div style="font-size: 120px;">🦈💐</div>
    <button id="start-btn">BẮT ĐẦU ✨</button>
</div>

<audio id="bgMusic" loop>
    <source src="Đã Lỡ Yêu Em Nhiều.mp3" type="audio/mpeg">
</audio>

<div id="slide-card">
    <h1 id="title"></h1>
    <div class="illustration-box">
        <img id="main-img">
    </div>
    <div id="text-container"><p id="text"></p></div>
    <div class="btn-group">
        <button class="nav-btn" id="prevBtn">Quay lại</button>
        <button class="nav-btn" id="nextBtn">Tiếp theo</button>
    </div>
    <div style="margin-top: 10px;">Hoàng Ngân Khánh 🦈</div>
</div>

<script>
const slides = [
    { title: "MỞ ĐẦU", img: "https://picsum.photos/1000/400?random=1", text: "Chào thầy cô và các bạn, mình là Ngân Khánh. Hôm nay mình sẽ nói về quy trình làm ra Thủy Tinh!" },
    { title: "THỦY TINH LÀ GÌ?", img: "https://picsum.photos/1000/400?random=2", text: "Thủy tinh là chất rắn vô định hình, trong suốt và cứng nhưng dễ vỡ." },
    { title: "ỨNG DỤNG", img: "https://picsum.photos/1000/400?random=3", text: "Dùng làm ly chén, cửa kính, màn hình điện thoại." },
    { title: "NGUYÊN LIỆU", img: "https://picsum.photos/1000/400?random=4", text: "Cát thạch anh, sô-đa và đá vôi." },
    { title: "NUNG CHẢY", img: "https://picsum.photos/1000/400?random=5", text: "Nung ở 1600°C để tạo thủy tinh lỏng." },
    { title: "TẠO HÌNH", img: "https://picsum.photos/1000/400?random=6", text: "Thổi hoặc ép khuôn để tạo hình." },
    { title: "HOÀN THIỆN", img: "https://picsum.photos/1000/400?random=7", text: "Làm nguội và mài bóng sản phẩm." },
    { title: "TÁI CHẾ", img: "https://picsum.photos/1000/400?random=8", text: "Có thể tái chế nhiều lần." },
    { title: "LỜI KẾT", img: "https://picsum.photos/1000/400?random=9", text: "Cảm ơn mọi người đã lắng nghe!" }
];

let current = 0;
const music = document.getElementById('bgMusic');

function speak(txt) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(txt);
    msg.lang = 'vi-VN';
    window.speechSynthesis.speak(msg);
}

function update() {
    const s = slides[current];
    title.innerText = (current+1) + ". " + s.title;
    document.getElementById('main-img').src = s.img;
    text.innerText = s.text;
    nextBtn.classList.toggle('hidden', current === slides.length-1);
    speak(s.text);
}

nextBtn.onclick = () => { if(current < slides.length-1){ current++; update(); }};
prevBtn.onclick = () => { if(current > 0){ current--; update(); }};

start-btn.onclick = () => {
    overlay.style.display = 'none';
    music.volume = 0.4;
    music.play();
    update();
};
</script>

</body>
</html>
