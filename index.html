<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuyết Trình Thủy Tinh - Ngân Khánh Chill</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            display: flex; justify-content: center; align-items: center;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Trang trí cây cối và mây */
        .decor-item { position: absolute; pointer-events: none; z-index: 1; }
        .tree-left { bottom: 0; left: -20px; font-size: 150px; opacity: 0.9; }
        .tree-right { bottom: 0; right: -20px; font-size: 120px; opacity: 0.8; }
        .cloud { font-size: 60px; color: white; opacity: 0.7; animation: moveCloud 20s linear infinite; }
        @keyframes moveCloud {
            from { transform: translateX(-100vw); }
            to { transform: translateX(100vw); }
        }

        #slide-card {
            width: 85%; max-width: 650px; background: rgba(255, 255, 255, 0.9);
            border-radius: 40px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center; z-index: 10; position: relative; border: 5px solid #fff;
        }
        .illust-box { font-size: 80px; margin-bottom: 20px; background: #e0f7fa; border-radius: 50%; width: 140px; height: 140px; line-height: 140px; margin: 0 auto 20px; }
        h1 { color: #0097a7; font-size: 1.8em; margin-bottom: 15px; }
        p { font-size: 1.2em; line-height: 1.6; color: #444; min-height: 120px; }
        
        .btn-group { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .nav-btn {
            background: #00bcd4; color: white; border: none; padding: 12px 25px;
            border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .nav-btn:hover { background: #0097a7; transform: translateY(-3px); }

        /* Màn hình chờ */
        #start-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background:white;
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #start-btn {
            padding: 15px 40px; font-size: 22px; border-radius: 35px; border:none;
            background: #e91e63; color:white; cursor:pointer; font-weight:bold; box-shadow: 0 10px 20px rgba(233,30,99,0.3);
        }
    </style>
</head>
<body>

<div class="decor-item tree-left">🌿</div>
<div class="decor-item tree-right">🌴</div>
<div class="decor-item cloud" style="top: 10%;">☁️</div>
<div class="decor-item cloud" style="top: 20%; animation-delay: -5s;">☁️</div>

<div id="start-overlay">
    <div style="font-size: 100px; margin-bottom: 20px;">🦈</div>
    <button id="start-btn">BẮT ĐẦU CHILL ✨</button>
</div>

<audio id="bgMusic" loop>
    <source src="Đã Lỡ Yêu Em Nhiều.mp3" type="audio/mpeg">
</audio>

<div id="slide-card">
    <div id="illust" class="illust-box">🦈</div>
    <h1 id="title">Trang 1: Xin chào!</h1>
    <p id="text">Bấm nút để nghe nhạc và thuyết trình nhé!</p>
    <div class="btn-group">
        <button class="nav-btn" id="prevBtn">Quay lại</button>
        <button class="nav-btn" id="nextBtn">Tiếp theo</button>
    </div>
    <div style="margin-top: 20px; font-weight: bold; color: #e91e63;">Hoàng Ngân Khánh</div>
</div>

<script>
    const slides = [
        { illust: "🦈", title: "TRANG 1: MỞ ĐẦU", text: "Xin chào thầy cô và các bạn. Mình là Hoàng Ngân Khánh. Hôm nay mình sẽ nói về quá trình sản xuất thủy tinh, một vật liệu cực kỳ quen thuộc!" },
        { illust: "💎", title: "Thủy tinh là gì?", text: "Thủy tinh là chất rắn vô định hình, trong suốt và rất đẹp nhưng cũng rất dễ vỡ nếu không cẩn thận." },
        { illust: "🏙️", title: "Ứng dụng", text: "Từ ly nước đến màn hình điện thoại, thủy tinh có mặt ở khắp mọi nơi xung quanh chúng ta." },
        { illust: "🏜️", title: "Nguyên liệu", text: "Thành phần chính là Cát Thạch Anh, kết hợp với Sô-đa và Đá Vôi để tạo ra hỗn hợp hoàn hảo." },
        { illust: "🔥", title: "Nung chảy", text: "Hỗn hợp được nung ở nhiệt độ 1600 độ C để chảy ra thành thủy tinh lỏng đỏ rực." },
        { illust: "🏺", title: "Tạo hình", text: "Người ta thổi, ép hoặc kéo thủy tinh lỏng để tạo ra các hình dáng chai lọ khác nhau." },
        { illust: "🌡️", title: "Ủ làm nguội", text: "Cần làm nguội thật chậm để thủy tinh không bị nứt vỡ đột ngột. Đây là bước rất quan trọng." },
        { illust: "♻️", title: "Tái chế", text: "Thủy tinh có thể tái chế mãi mãi, giúp bảo vệ môi trường xanh sạch đẹp!" },
        { illust: "💖", title: "Lời kết", text: "Cảm ơn mọi người đã lắng nghe bài thuyết trình của Ngân Khánh. Chúc mọi người một ngày thật chill!" }
    ];

    let current = 0;
    const music = document.getElementById('bgMusic');

    function speak(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'vi-VN';
        msg.rate = 1.4; // Tốc độ nhanh theo ý Khánh
        window.speechSynthesis.speak(msg);
    }

    function update() {
        const s = slides[current];
        document.getElementById('illust').innerText = s.illust;
        document.getElementById('title').innerText = s.title;
        document.getElementById('text').innerText = s.text;
        speak(s.text);
    }

    document.getElementById('nextBtn').onclick = () => { if(current < slides.length-1) { current++; update(); } };
    document.getElementById('prevBtn').onclick = () => { if(current > 0) { current--; update(); } };

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-overlay').style.display = 'none';
        music.volume = 0.4;
        music.play();
        update();
    };
</script>
</body>
</html>
