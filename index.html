<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản xuất Thủy Tinh - Ngân Khánh</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(45deg, #a2d2ff, #ffafbd, #c9bbff);
        }
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            display: flex; justify-content: center; align-items: center;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .sticker { position: absolute; font-size: 30px; z-index: 1; animation: fly 4s linear infinite; pointer-events: none; }
        @keyframes fly {
            from { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            to { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
        #slide-card {
            width: 85%; max-width: 800px; background: rgba(255, 255, 255, 0.9);
            border-radius: 40px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center; z-index: 10; position: relative; border: 5px solid #fff;
        }
        .illust { font-size: 80px; margin: 20px 0; display: block; }
        .gura-img { width: 120px; border-radius: 50%; border: 4px solid #ffafbd; margin-bottom: 10px; }
        h1 { color: #d63384; font-size: 2em; margin-bottom: 15px; }
        p { font-size: 1.3em; line-height: 1.5; color: #444; min-height: 120px; padding: 0 20px; }
        .nav-btn {
            background: #fff; border: none; width: 50px; height: 50px; border-radius: 50%;
            cursor: pointer; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s; position: absolute; top: 50%; transform: translateY(-50%);
        }
        .nav-btn:hover { background: #ffafbd; color: white; scale: 1.1; }
        #prevBtn { left: -25px; } #nextBtn { right: -25px; }
        #start-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background:white;
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #start-btn {
            padding: 15px 30px; font-size: 20px; border-radius: 30px; border:none;
            background: #d63384; color:white; cursor:pointer; font-weight:bold;
        }
    </style>
</head>
<body>

<div id="start-overlay">
    <img src="https://i.ibb.co/VmxM4Gf/image-a415a0.jpg" class="gura-img" alt="Gura">
    <button id="start-btn">BẮT ĐẦU THUYẾT TRÌNH 🎬</button>
</div>

<audio id="bgMusic" loop>
    <source src="nhac_nen.mp3" type="audio/mpeg">
</audio>

<div id="slide-card">
    <button class="nav-btn" id="prevBtn">⬅️</button>
    <button class="nav-btn" id="nextBtn">➡️</button>
    
    <div id="content">
        <div id="illust" class="illust">🎬</div>
        <h1 id="title">Chào mừng!</h1>
        <p id="text">Nhấn nút để bắt đầu nhé Khánh ơi!</p>
        <div style="font-weight: bold; color: #6f42c1;">Hoàng Ngân Khánh</div>
    </div>
</div>

<script>
    const slides = [
        { illust: "🌊", title: "TRANG 1 – MỞ ĐẦU", text: "Xin chào thầy cô và các bạn. Mình là Hoàng Ngân Khánh. Hôm nay mình sẽ nói về quá trình sản xuất thủy tinh, một vật liệu cực kỳ quen thuộc từ cốc nước đến màn hình điện thoại!" },
        { illust: "🔍", title: "TRANG 2 – THỦY TINH LÀ GÌ?", text: "Thủy tinh là chất rắn vô định hình, không có trật tự phân tử cố định. Nó trong suốt, dễ uốn khi nóng nhưng lại rất cứng và dễ vỡ khi chịu lực mạnh." },
        { illust: "🏠", title: "TRANG 3 – ỨNG DỤNG", text: "Thủy tinh có mặt ở khắp nơi: từ ly bát trong bếp, kính xây dựng, đến màn hình điện thoại và ống nghiệm y tế. Nó vô cùng quan trọng!" },
        { illust: "🏖️", title: "TRANG 4 – NGUYÊN LIỆU", text: "Nguyên liệu chính là Cát thạch anh chiếm 75%. Ngoài ra còn có Sô đa để hạ nhiệt độ nóng chảy và Đá vôi để giúp thủy tinh bền hơn, không tan trong nước." },
        { illust: "🥣", title: "TRANG 5 – TRỘN NGUYÊN LIỆU", text: "Tất cả được cân đo chính xác rồi trộn đều. Nếu sai tỉ lệ một chút thôi là thủy tinh sẽ bị đục hoặc yếu ngay." },
        { illust: "🔥", title: "TRANG 6 – NUNG CHẢY", text: "Hỗn hợp được nung ở 1400 đến 1600 độ C. Các phản ứng hóa học xảy ra biến cát và phụ gia thành thủy tinh lỏng đỏ rực!" },
        { illust: "🏺", title: "TRANG 7 – TẠO HÌNH", text: "Thủy tinh lỏng được thổi để làm chai lọ, ép khuôn để tạo hình chính xác hoặc kéo thành những tấm kính phẳng đại dương." },
        { illust: "❄️", title: "TRANG 8 – Ủ LÀM NGUỘI", text: "Sau khi tạo hình, phải làm nguội thật chậm trong lò ủ. Nếu làm nguội nhanh quá, thủy tinh sẽ tự nứt vỡ do ứng suất." },
        { illust: "✨", title: "TRANG 9 – HOÀN THIỆN", text: "Sản phẩm sẽ được mài cạnh, đánh bóng và kiểm tra lỗi. Một số được tôi nhiệt để thành kính cường lực siêu bền." },
        { illust: "🌱", title: "TRANG 10 – MÔI TRƯỜNG", text: "Tái chế thủy tinh rất quan trọng! Nó giúp tiết kiệm năng lượng và bảo vệ trái đất. Thủy tinh có thể tái chế đi tái chế lại mãi mãi." },
        { illust: "💝", title: "TRANG 11 – KẾT LUẬN", text: "Từ cát đơn giản, con người đã tạo ra vật liệu tuyệt vời. Cảm ơn thầy cô và các bạn đã lắng nghe bài thuyết trình của Ngân Khánh!" }
    ];

    let current = 0;
    const stickers = ["🐧","🐰","💖","🌺","❤","🍀","💟","🙀","👻","💦","😺","🐴","🗿","🤗","🐇","🍃","🤓","🍂","😇"];

    function createSticker() {
        const s = document.createElement('div');
        s.className = 'sticker';
        s.innerText = stickers[Math.floor(Math.random() * stickers.length)];
        s.style.left = Math.random() * 100 + "vw";
        s.style.animationDuration = (Math.random() * 2 + 2) + "s";
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 4000);
    }
    setInterval(createSticker, 400);

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'vi-VN';
        msg.rate = 1.3; // TỐC ĐỘ ĐỌC NHANH THEO Ý KHÁNH ĐÂY!
        msg.pitch = 1.1;
        window.speechSynthesis.speak(msg);
    }

    function update() {
        const s = slides[current];
        document.getElementById('illust').innerText = s.illust;
        document.getElementById('title').innerText = s.title;
        document.getElementById('text').innerText = s.text;
        speak(s.text);
    }

    document.getElementById('nextBtn').onclick = () => { if(current < slides.length-1) { current++; update(); } };
    document.getElementById('prevBtn').onclick = () => { if(current > 0) { current--; update(); } };

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-overlay').style.display = 'none';
        const music = document.getElementById('bgMusic');
        music.volume = 0.15;
        music.play().catch(() => console.log("Cần file nhac_nen.mp3"));
        update();
    };
</script>
</body>
</html>
